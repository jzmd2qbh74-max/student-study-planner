spring:
  application:
    name: student-study-planner

  datasource:
    url: jdbc:mysql://localhost:3307/studyplanner?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: student
    password: student
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.MySQLDialect

server:
  port: 8080